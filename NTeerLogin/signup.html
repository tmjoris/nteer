<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTeer Signup</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="login-container">
        <img src="assets/logo.png" alt="NTeer Logo" class="logo">
        <h1>Welcome to NTeer</h1>
        <p class="subtitle">Create an account to get started</p>

        <form>
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" placeholder="John Doe" required>
        
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required>
        
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        
            <p class="role-title">I am a...</p>
            <div class="role-selection">
                <label class="role-option">
                    <input type="radio" name="role" value="student" checked>
                    Student
                </label>
                <label class="role-option">
                    <input type="radio" name="role" value="supervisor">
                    Supervisor
                </label>
                <label class="role-option">
                    <input type="radio" name="role" value="admin">
                    Admin
                </label>
            </div>
        
            <button type="submit" class="btn">Create Account ➝</button>
        </form>

        <p class="signup-text">
            Already have an account? <a href="index.html">Sign in</a>
        </p>
    </div>
</body>

</html>
